name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Test, lint, build, and audit
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: ci-secret-value-with-enough-length
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD_HASH: scrypt$16384$8$1$test-salt$GGp03_CxrK_udF3Hk_SoGBXB7i1a9TccbmpPi9Fp5ZEUZUbLNqHf7fZLCibf642XtkU6D9zcRsiAWpMN-6_4qA

    steps:
      - name: Check out repository
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx playwright install --with-deps chromium

      - name: Prepare smoke test database
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run db:push
          npm run db:seed

      - name: Start app for E2E smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm run start &
          echo "$!" > .next-server.pid
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:3000/api/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "App did not become healthy on http://localhost:3000."
          exit 1

      - name: Run E2E smoke
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run smoke:e2e -- http://localhost:3000 --require-demo

      - name: Stop app
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -f .next-server.pid ]; then
            kill "$(cat .next-server.pid)" || true
          fi

      - name: Build Docker image
        run: docker build .

      - name: Audit dependencies
        run: npm audit
