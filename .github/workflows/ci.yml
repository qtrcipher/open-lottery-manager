name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Test, lint, build, and audit
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./dev.db
      AUTH_SECRET: ci-secret-value-with-enough-length
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD_HASH: scrypt$16384$8$1$test-salt$GGp03_CxrK_udF3Hk_SoGBXB7i1a9TccbmpPi9Fp5ZEUZUbLNqHf7fZLCibf642XtkU6D9zcRsiAWpMN-6_4qA

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Audit dependencies
        run: npm audit
